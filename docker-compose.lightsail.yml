services:
  bff:
    image: ${BFF_IMAGE:?BFF_IMAGE is required}
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PORT: 3001
    volumes:
      - ${FLOVIA_DATA_DIR:?FLOVIA_DATA_DIR is required}:${BFF_DATA_MOUNT_PATH:?BFF_DATA_MOUNT_PATH is required}
    ports:
      - "${BFF_PORT:-3001}:3001"
    restart: unless-stopped
