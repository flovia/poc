resolver 127.0.0.11 ipv6=off valid=30s;

server {
  listen 80;
  server_name _;

  location = / {
    default_type application/json;
    return 200 '{"branches":["main","develop"]}';
  }

  location = /main {
    return 308 /main/;
  }

  location /main/ {
    set $main_upstream main-bff:3001;
    rewrite ^/main/?(.*)$ /$1 break;
    proxy_pass http://$main_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /main;
  }

  location = /develop {
    return 308 /develop/;
  }

  location /develop/ {
    set $develop_upstream develop-bff:3001;
    rewrite ^/develop/?(.*)$ /$1 break;
    proxy_pass http://$develop_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /develop;
  }
}
