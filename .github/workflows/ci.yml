name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify offline checks
        run: bun run verify

      - name: Check formatting
        run: bun run format:check
