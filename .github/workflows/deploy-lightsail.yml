name: deploy-lightsail

# Required repository secrets:
# - AWS_REGION
# - AWS_ROLE_TO_ASSUME
# - LIGHTSAIL_INSTANCE_NAME
# - LIGHTSAIL_DEPLOY_PATH
# LIGHTSAIL_DEPLOY_PATH should point at the repository checkout on the
# instance, for example /home/ec2-user/poc.
# AWS_ROLE_TO_ASSUME should allow OIDC from this repository and
# lightsail:GetInstanceAccessDetails on the target instance.
# The workflow seeds missing FLOVIA_DATA_DIR / BFF_DATA_MOUNT_PATH /
# DATABASE_URL / REPORTS_DIR entries into ${LIGHTSAIL_DEPLOY_PATH}/.env
# and updates BFF_IMAGE before docker compose runs.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-lightsail-main
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LIGHTSAIL_INSTANCE_NAME: ${{ secrets.LIGHTSAIL_INSTANCE_NAME }}
      LIGHTSAIL_DEPLOY_PATH: ${{ secrets.LIGHTSAIL_DEPLOY_PATH }}
    steps:
      - name: Validate deployment configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail
          for key in AWS_REGION AWS_ROLE_TO_ASSUME LIGHTSAIL_INSTANCE_NAME LIGHTSAIL_DEPLOY_PATH; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}" >&2
              exit 1
            fi
          done

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          set -euo pipefail
          image_namespace="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          deploy_git_sha="$(git rev-parse HEAD)"

          {
            echo "IMAGE_NAMESPACE=${image_namespace}"
            echo "BFF_IMAGE=ghcr.io/${image_namespace}/flovia-poc-bff"
            echo "DEPLOY_GIT_SHA=${deploy_git_sha}"
          } >> "$GITHUB_ENV"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push BFF image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bff/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BFF_IMAGE }}:main
            ${{ env.BFF_IMAGE }}:${{ env.DEPLOY_GIT_SHA }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: deploy-lightsail-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Prepare temporary Lightsail SSH access
        run: |
          set -euo pipefail
          access_details="$(aws lightsail get-instance-access-details \
            --region "${AWS_REGION}" \
            --instance-name "${LIGHTSAIL_INSTANCE_NAME}" \
            --protocol ssh \
            --output json)"

          lightsail_host="$(printf '%s' "${access_details}" | jq -r '.accessDetails.ipAddress')"
          lightsail_user="$(printf '%s' "${access_details}" | jq -r '.accessDetails.username')"

          install -m 700 -d ~/.ssh
          printf '%s' "${access_details}" | jq -r '.accessDetails.privateKey' > ~/.ssh/lightsail-tempkey
          printf '%s' "${access_details}" | jq -r '.accessDetails.certKey' > ~/.ssh/lightsail-tempkey-cert.pub
          printf '%s' "${access_details}" | jq -r --arg host "${lightsail_host}" '.accessDetails.hostKeys[] | "\($host) \(.algorithm) \(.publicKey)"' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail-tempkey
          chmod 644 ~/.ssh/lightsail-tempkey-cert.pub ~/.ssh/known_hosts

          {
            echo "LIGHTSAIL_HOST=${lightsail_host}"
            echo "LIGHTSAIL_USER=${lightsail_user}"
            echo "LIGHTSAIL_SSH_KEY_PATH=$HOME/.ssh/lightsail-tempkey"
            echo "LIGHTSAIL_SSH_CERT_PATH=$HOME/.ssh/lightsail-tempkey-cert.pub"
            echo "LIGHTSAIL_KNOWN_HOSTS_PATH=$HOME/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Pull repository and restart services on Lightsail
        run: |
          set -euo pipefail
          ssh \
            -i "${LIGHTSAIL_SSH_KEY_PATH}" \
            -o CertificateFile="${LIGHTSAIL_SSH_CERT_PATH}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${LIGHTSAIL_KNOWN_HOSTS_PATH}" \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            GHCR_USERNAME="${{ github.actor }}" \
            GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            BFF_IMAGE_REF="${BFF_IMAGE}:${DEPLOY_GIT_SHA}" \
            LIGHTSAIL_DEPLOY_PATH="${LIGHTSAIL_DEPLOY_PATH}" \
            "bash -s" <<'EOF'
          set -euo pipefail
          if [ ! -d "$LIGHTSAIL_DEPLOY_PATH/.git" ]; then
            echo "Expected a git checkout at $LIGHTSAIL_DEPLOY_PATH" >&2
            exit 1
          fi

          if ! git -C "$LIGHTSAIL_DEPLOY_PATH" diff --quiet || ! git -C "$LIGHTSAIL_DEPLOY_PATH" diff --cached --quiet; then
            echo "Refusing to deploy because tracked files under $LIGHTSAIL_DEPLOY_PATH have local changes." >&2
            git -C "$LIGHTSAIL_DEPLOY_PATH" status --short >&2
            exit 1
          fi

          git -C "$LIGHTSAIL_DEPLOY_PATH" fetch --prune origin
          git -C "$LIGHTSAIL_DEPLOY_PATH" checkout main
          git -C "$LIGHTSAIL_DEPLOY_PATH" pull --ff-only origin main

          cd "$LIGHTSAIL_DEPLOY_PATH"

          touch .env

          upsert_env_var() {
            key="$1"
            value="$2"
            temp_file="$(mktemp)"

            awk -v key="$key" -v value="$value" '
              BEGIN { updated = 0 }
              index($0, key "=") == 1 {
                print key "=" value
                updated = 1
                next
              }
              { print }
              END {
                if (!updated) {
                  print key "=" value
                }
              }
            ' .env > "$temp_file"

            mv "$temp_file" .env
          }

          ensure_env_var() {
            key="$1"
            value="$2"

            if ! grep -q "^${key}=" .env; then
              printf '\n%s=%s\n' "$key" "$value" >> .env
            fi
          }

          default_data_dir="${LIGHTSAIL_DEPLOY_PATH}/docker-data"
          ensure_env_var FLOVIA_DATA_DIR "$default_data_dir"
          ensure_env_var BFF_DATA_MOUNT_PATH "$default_data_dir"
          ensure_env_var DATABASE_URL "${default_data_dir}/flovia.db"
          ensure_env_var REPORTS_DIR "${default_data_dir}/reports"
          upsert_env_var BFF_IMAGE "$BFF_IMAGE_REF"

          set -a
          . ./.env
          set +a

          FLOVIA_DATA_DIR="${FLOVIA_DATA_DIR:-$default_data_dir}"

          mkdir -p "$FLOVIA_DATA_DIR" "$FLOVIA_DATA_DIR/reports"
          printf '%s\n' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose -f docker-compose.lightsail.yml config >/dev/null
          docker compose -f docker-compose.lightsail.yml pull bff
          docker compose -f docker-compose.lightsail.yml up -d --force-recreate --remove-orphans
          docker logout ghcr.io >/dev/null 2>&1 || true
          EOF
