name: deploy-lightsail-main

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-lightsail-main.yml
      - .github/workflows/deploy-lightsail-shared.yml
      - apps/bff/**
      - apps/cli/**
      - packages/**
      - scripts/**
      - deploy/**
      - docker-compose.lightsail.yml
      - package.json
      - bun.lock
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: deploy-lightsail-shared-instance
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/deploy-lightsail-shared.yml
    with:
      deploy_branch: main
    secrets: inherit
