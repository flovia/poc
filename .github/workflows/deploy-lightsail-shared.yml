name: deploy-lightsail-shared

# Required repository secrets:
# - AWS_REGION
# - AWS_ROLE_TO_ASSUME
# - LIGHTSAIL_INSTANCE_NAME
# Optional repository secrets for Caddy HTTPS:
# Optional repository secrets for BFF Bedrock inference:
# - AWS_BEARER_TOKEN_BEDROCK
# - BFF_BEDROCK_REGION
# - BFF_BEDROCK_MODEL_ID
# - BFF_BEDROCK_PROMPT_VERSION
# Optional repository secrets for live analytics:
# - MAIN_BFF_ANALYTICS_DATABASE_URL
# - DEVELOP_BFF_ANALYTICS_DATABASE_URL
# - BFF_ANALYTICS_DATABASE_URL
# - MAIN_HITPAY_API_KEY
# - MAIN_HITPAY_WEBHOOK_SALT
# - MAIN_HITPAY_MPP_ENDPOINT
# - DEVELOP_HITPAY_API_KEY
# - DEVELOP_HITPAY_WEBHOOK_SALT
# - DEVELOP_HITPAY_MPP_ENDPOINT
# - HITPAY_API_KEY
# - HITPAY_WEBHOOK_SALT
# - HITPAY_MPP_ENDPOINT
# - MPPX_PRIVATE_KEY
# - DEVELOP_STRIPE_SECRET_KEY
# - DEVELOP_MPPX_PRIVATE_KEY
# - DEVELOP_MPP_SECRET_KEY
# Deploy layout on the instance:
# - $HOME/apps/main/poc and $HOME/apps/main/data
# - $HOME/apps/develop/poc and $HOME/apps/develop/data
# - $HOME/apps/lightsail-stack for the shared docker compose stack

on:
  workflow_call:
    inputs:
      deploy_branch:
        description: branch to deploy
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      LIGHTSAIL_INSTANCE_NAME: ${{ secrets.LIGHTSAIL_INSTANCE_NAME }}
      DEPLOY_BRANCH: ${{ inputs.deploy_branch }}
    steps:
      - name: Validate deployment configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
        run: |
          set -euo pipefail
          for key in AWS_REGION AWS_ROLE_TO_ASSUME LIGHTSAIL_INSTANCE_NAME DEPLOY_BRANCH; do
            if [ -z "${!key}" ]; then
              echo "Missing required value: ${key}" >&2
              exit 1
            fi
          done

          case "${DEPLOY_BRANCH}" in
            main|develop)
              ;;
            *)
              echo "Unsupported branch: ${DEPLOY_BRANCH}" >&2
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_branch }}

      - name: Set image metadata
        run: |
          set -euo pipefail
          image_namespace="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          deploy_git_sha="$(git rev-parse HEAD)"

          {
            echo "BFF_IMAGE_REPOSITORY=ghcr.io/${image_namespace}/flovia-poc-bff"
            echo "DEPLOY_GIT_SHA=${deploy_git_sha}"
          } >> "$GITHUB_ENV"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push BFF image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/bff/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BFF_IMAGE_REPOSITORY }}:${{ env.DEPLOY_BRANCH }}
            ${{ env.BFF_IMAGE_REPOSITORY }}:${{ env.DEPLOY_GIT_SHA }}

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: deploy-lightsail-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Prepare temporary Lightsail SSH access
        run: |
          set -euo pipefail
          access_details="$(aws lightsail get-instance-access-details \
            --region "${AWS_REGION}" \
            --instance-name "${LIGHTSAIL_INSTANCE_NAME}" \
            --protocol ssh \
            --output json)"

          lightsail_host="$(printf '%s' "${access_details}" | jq -r '.accessDetails.ipAddress')"
          lightsail_user="$(printf '%s' "${access_details}" | jq -r '.accessDetails.username')"

          install -m 700 -d ~/.ssh
          printf '%s' "${access_details}" | jq -r '.accessDetails.privateKey' > ~/.ssh/lightsail-tempkey
          printf '%s' "${access_details}" | jq -r '.accessDetails.certKey' > ~/.ssh/lightsail-tempkey-cert.pub
          printf '%s' "${access_details}" | jq -r --arg host "${lightsail_host}" '.accessDetails.hostKeys[] | "\($host) \(.algorithm) \(.publicKey)"' > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/lightsail-tempkey
          chmod 644 ~/.ssh/lightsail-tempkey-cert.pub ~/.ssh/known_hosts

          {
            echo "LIGHTSAIL_HOST=${lightsail_host}"
            echo "LIGHTSAIL_USER=${lightsail_user}"
            echo "LIGHTSAIL_SSH_KEY_PATH=$HOME/.ssh/lightsail-tempkey"
            echo "LIGHTSAIL_SSH_CERT_PATH=$HOME/.ssh/lightsail-tempkey-cert.pub"
            echo "LIGHTSAIL_KNOWN_HOSTS_PATH=$HOME/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Sync branch checkout and shared stack on Lightsail
        env:
          MAIN_BFF_ANALYTICS_DATABASE_URL: ${{ secrets.MAIN_BFF_ANALYTICS_DATABASE_URL }}
          DEVELOP_BFF_ANALYTICS_DATABASE_URL: ${{ secrets.DEVELOP_BFF_ANALYTICS_DATABASE_URL }}
          BFF_ANALYTICS_DATABASE_URL: ${{ secrets.BFF_ANALYTICS_DATABASE_URL }}
          MAIN_HITPAY_API_KEY: ${{ secrets.MAIN_HITPAY_API_KEY }}
          MAIN_HITPAY_WEBHOOK_SALT: ${{ secrets.MAIN_HITPAY_WEBHOOK_SALT }}
          MAIN_HITPAY_MPP_ENDPOINT: ${{ secrets.MAIN_HITPAY_MPP_ENDPOINT }}
          DEVELOP_HITPAY_API_KEY: ${{ secrets.DEVELOP_HITPAY_API_KEY }}
          DEVELOP_HITPAY_WEBHOOK_SALT: ${{ secrets.DEVELOP_HITPAY_WEBHOOK_SALT }}
          DEVELOP_HITPAY_MPP_ENDPOINT: ${{ secrets.DEVELOP_HITPAY_MPP_ENDPOINT }}
          HITPAY_API_KEY: ${{ secrets.HITPAY_API_KEY }}
          HITPAY_WEBHOOK_SALT: ${{ secrets.HITPAY_WEBHOOK_SALT }}
          HITPAY_MPP_ENDPOINT: ${{ secrets.HITPAY_MPP_ENDPOINT }}
          MPPX_PRIVATE_KEY: ${{ secrets.MPPX_PRIVATE_KEY }}
          DEVELOP_STRIPE_SECRET_KEY: ${{ secrets.DEVELOP_STRIPE_SECRET_KEY }}
          DEVELOP_MPPX_PRIVATE_KEY: ${{ secrets.DEVELOP_MPPX_PRIVATE_KEY }}
          DEVELOP_MPP_SECRET_KEY: ${{ secrets.DEVELOP_MPP_SECRET_KEY }}
        run: |
          set -euo pipefail

          encode_env() {
            local key="$1"
            if [ -n "${!key:-}" ]; then
              printf '%s' "${!key}" | base64 | tr -d '\n'
            fi
          }

          main_bff_analytics_database_url_b64="$(encode_env MAIN_BFF_ANALYTICS_DATABASE_URL)"
          develop_bff_analytics_database_url_b64="$(encode_env DEVELOP_BFF_ANALYTICS_DATABASE_URL)"
          bff_analytics_database_url_b64="$(encode_env BFF_ANALYTICS_DATABASE_URL)"
          main_hitpay_api_key_b64="$(encode_env MAIN_HITPAY_API_KEY)"
          main_hitpay_webhook_salt_b64="$(encode_env MAIN_HITPAY_WEBHOOK_SALT)"
          main_hitpay_mpp_endpoint_b64="$(encode_env MAIN_HITPAY_MPP_ENDPOINT)"
          develop_hitpay_api_key_b64="$(encode_env DEVELOP_HITPAY_API_KEY)"
          develop_hitpay_webhook_salt_b64="$(encode_env DEVELOP_HITPAY_WEBHOOK_SALT)"
          develop_hitpay_mpp_endpoint_b64="$(encode_env DEVELOP_HITPAY_MPP_ENDPOINT)"
          hitpay_api_key_b64="$(encode_env HITPAY_API_KEY)"
          hitpay_webhook_salt_b64="$(encode_env HITPAY_WEBHOOK_SALT)"
          hitpay_mpp_endpoint_b64="$(encode_env HITPAY_MPP_ENDPOINT)"
          mppx_private_key_b64="$(encode_env MPPX_PRIVATE_KEY)"
          develop_stripe_secret_key_b64="$(encode_env DEVELOP_STRIPE_SECRET_KEY)"
          develop_mppx_private_key_b64="$(encode_env DEVELOP_MPPX_PRIVATE_KEY)"
          develop_mpp_secret_key_b64="$(encode_env DEVELOP_MPP_SECRET_KEY)"

          ssh \
            -i "${LIGHTSAIL_SSH_KEY_PATH}" \
            -o CertificateFile="${LIGHTSAIL_SSH_CERT_PATH}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="${LIGHTSAIL_KNOWN_HOSTS_PATH}" \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            GHCR_USERNAME="${{ github.actor }}" \
            GHCR_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            GH_REPO_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            GITHUB_REPOSITORY="${{ github.repository }}" \
            DEPLOY_BRANCH="${DEPLOY_BRANCH}" \
            DEPLOY_GIT_SHA="${DEPLOY_GIT_SHA}" \
            BFF_IMAGE_REPOSITORY="${BFF_IMAGE_REPOSITORY}" \
            AWS_BEARER_TOKEN_BEDROCK="${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}" \
            BFF_BEDROCK_REGION="${{ secrets.BFF_BEDROCK_REGION }}" \
            BFF_BEDROCK_MODEL_ID="${{ secrets.BFF_BEDROCK_MODEL_ID }}" \
            BFF_BEDROCK_PROMPT_VERSION="${{ secrets.BFF_BEDROCK_PROMPT_VERSION }}" \
            MAIN_BFF_ANALYTICS_DATABASE_URL_B64="${main_bff_analytics_database_url_b64}" \
            DEVELOP_BFF_ANALYTICS_DATABASE_URL_B64="${develop_bff_analytics_database_url_b64}" \
            BFF_ANALYTICS_DATABASE_URL_B64="${bff_analytics_database_url_b64}" \
            MAIN_HITPAY_API_KEY_B64="${main_hitpay_api_key_b64}" \
            MAIN_HITPAY_WEBHOOK_SALT_B64="${main_hitpay_webhook_salt_b64}" \
            MAIN_HITPAY_MPP_ENDPOINT_B64="${main_hitpay_mpp_endpoint_b64}" \
            DEVELOP_HITPAY_API_KEY_B64="${develop_hitpay_api_key_b64}" \
            DEVELOP_HITPAY_WEBHOOK_SALT_B64="${develop_hitpay_webhook_salt_b64}" \
            DEVELOP_HITPAY_MPP_ENDPOINT_B64="${develop_hitpay_mpp_endpoint_b64}" \
            HITPAY_API_KEY_B64="${hitpay_api_key_b64}" \
            HITPAY_WEBHOOK_SALT_B64="${hitpay_webhook_salt_b64}" \
            HITPAY_MPP_ENDPOINT_B64="${hitpay_mpp_endpoint_b64}" \
            MPPX_PRIVATE_KEY_B64="${mppx_private_key_b64}" \
            DEVELOP_STRIPE_SECRET_KEY_B64="${develop_stripe_secret_key_b64}" \
            DEVELOP_MPPX_PRIVATE_KEY_B64="${develop_mppx_private_key_b64}" \
            DEVELOP_MPP_SECRET_KEY_B64="${develop_mpp_secret_key_b64}" \
            "bash -s" <<'EOF'
          set -euo pipefail

          decode_env() {
            local source_key="$1"
            local target_key="$2"
            local encoded_value="${!source_key:-}"

            if [ -n "$encoded_value" ]; then
              printf -v "$target_key" '%s' "$(printf '%s' "$encoded_value" | base64 -d)"
              export "$target_key"
              return
            fi

            unset "$target_key"
          }

          decode_env MAIN_BFF_ANALYTICS_DATABASE_URL_B64 MAIN_BFF_ANALYTICS_DATABASE_URL
          decode_env DEVELOP_BFF_ANALYTICS_DATABASE_URL_B64 DEVELOP_BFF_ANALYTICS_DATABASE_URL
          decode_env BFF_ANALYTICS_DATABASE_URL_B64 BFF_ANALYTICS_DATABASE_URL
          decode_env MAIN_HITPAY_API_KEY_B64 MAIN_HITPAY_API_KEY
          decode_env MAIN_HITPAY_WEBHOOK_SALT_B64 MAIN_HITPAY_WEBHOOK_SALT
          decode_env MAIN_HITPAY_MPP_ENDPOINT_B64 MAIN_HITPAY_MPP_ENDPOINT
          decode_env DEVELOP_HITPAY_API_KEY_B64 DEVELOP_HITPAY_API_KEY
          decode_env DEVELOP_HITPAY_WEBHOOK_SALT_B64 DEVELOP_HITPAY_WEBHOOK_SALT
          decode_env DEVELOP_HITPAY_MPP_ENDPOINT_B64 DEVELOP_HITPAY_MPP_ENDPOINT
          decode_env HITPAY_API_KEY_B64 HITPAY_API_KEY
          decode_env HITPAY_WEBHOOK_SALT_B64 HITPAY_WEBHOOK_SALT
          decode_env HITPAY_MPP_ENDPOINT_B64 HITPAY_MPP_ENDPOINT
          decode_env MPPX_PRIVATE_KEY_B64 MPPX_PRIVATE_KEY
          decode_env DEVELOP_STRIPE_SECRET_KEY_B64 DEVELOP_STRIPE_SECRET_KEY
          decode_env DEVELOP_MPPX_PRIVATE_KEY_B64 DEVELOP_MPPX_PRIVATE_KEY
          decode_env DEVELOP_MPP_SECRET_KEY_B64 DEVELOP_MPP_SECRET_KEY

          apps_root="$HOME/apps"
          branch_root="${apps_root}/${DEPLOY_BRANCH}"
          deploy_path="${branch_root}/poc"
          git_auth_header="Authorization: Basic $(printf 'x-access-token:%s' "$GH_REPO_TOKEN" | base64 | tr -d '\n')"

          if [ -e "$deploy_path" ] && [ ! -d "$deploy_path/.git" ]; then
            echo "Expected ${deploy_path} to be a git checkout." >&2
            exit 1
          fi

          mkdir -p "$branch_root"

          if [ ! -d "$deploy_path/.git" ]; then
            git -c http.extraHeader="$git_auth_header" clone \
              --branch "$DEPLOY_BRANCH" \
              --single-branch \
              "https://github.com/${GITHUB_REPOSITORY}.git" \
              "$deploy_path"
          else
            if ! git -C "$deploy_path" diff --quiet || ! git -C "$deploy_path" diff --cached --quiet; then
              echo "Refusing to deploy because tracked files under $deploy_path have local changes." >&2
              git -C "$deploy_path" status --short >&2
              exit 1
            fi

            git -c http.extraHeader="$git_auth_header" -C "$deploy_path" fetch --prune origin
            git -C "$deploy_path" checkout "$DEPLOY_BRANCH"
            git -c http.extraHeader="$git_auth_header" -C "$deploy_path" pull --ff-only origin "$DEPLOY_BRANCH"
          fi

          git -C "$deploy_path" checkout "$DEPLOY_GIT_SHA"

          export DEPLOY_BRANCH
          export DEPLOY_GIT_SHA
          export BFF_IMAGE_REPOSITORY
          export GHCR_USERNAME
          export GHCR_TOKEN

          cd "$deploy_path"
          bash ./scripts/deploy/lightsail-sync-stack.sh
          EOF
