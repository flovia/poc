services:
  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-/data/flovia.db}
      BFF_ANALYTICS_SOURCE: ${BFF_ANALYTICS_SOURCE:-}
      BFF_ANALYTICS_DATABASE_URL: ${BFF_ANALYTICS_DATABASE_URL:-}
      BFF_ANALYTICS_READ_MODEL_PATH: ${BFF_ANALYTICS_READ_MODEL_PATH:-}
      BFF_ANALYTICS_SNAPSHOT_ID: ${BFF_ANALYTICS_SNAPSHOT_ID:-latest}
      HITPAY_API_KEY: ${HITPAY_API_KEY:-}
      HITPAY_WEBHOOK_SALT: ${HITPAY_WEBHOOK_SALT:-}
      HITPAY_MPP_ENDPOINT: ${HITPAY_MPP_ENDPOINT:-https://sandbox.mpp.hitpay.dev}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      MPPX_PRIVATE_KEY: ${MPPX_PRIVATE_KEY:-}
      MPP_SECRET_KEY: ${MPP_SECRET_KEY:-}
      PORT: 3001
      # AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      # AWS_REGION: ${AWS_REGION:-}
      # AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      # BFF_BEDROCK_MODEL_ID: ${BFF_BEDROCK_MODEL_ID:-}
      # BFF_BEDROCK_PROMPT_VERSION: ${BFF_BEDROCK_PROMPT_VERSION:-}
      # BFF_BRANCH_NAME: ${BFF_BRANCH_NAME:-local}
      # BFF_DEPLOY_ID: ${BFF_DEPLOY_ID:-}
    volumes:
      - ${FLOVIA_DATA_DIR:-./docker-data}:${BFF_DATA_MOUNT_PATH:-/data}
    ports:
      - "${BFF_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3001/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      bff:
        condition: service_healthy
    environment:
      BFF_URL: http://bff:3001
      NEXT_PUBLIC_BFF_URL: /api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
