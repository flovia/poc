services:
  cli:
    build:
      context: .
      dockerfile: apps/cli/Dockerfile
    environment:
      DATABASE_URL: /data/flovia.db
      REPORTS_DIR: /data/reports
      FIXTURES_DIR: /app/apps/cli/fixtures
      MANIFEST_PATH: /app/apps/cli/fixtures/manifest.json
      RPC_REQUEST_TIMEOUT_MS: 30000
    volumes:
      - ./docker-data:/data
    restart: "no"

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    environment:
      DATABASE_URL: /data/flovia.db
      PORT: 3001
    volumes:
      - ./docker-data:/data
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "bun", "-e", "const r = await fetch('http://localhost:3001/health'); process.exit(r.ok ? 0 : 1)"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    depends_on:
      bff:
        condition: service_healthy
    environment:
      BFF_URL: http://bff:3001
      NEXT_PUBLIC_BFF_URL: /api
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
