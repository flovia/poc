services:
  cli:
    build:
      context: .
      dockerfile: apps/cli/Dockerfile
    environment:
      DATABASE_URL: /data/flovia.db
      REPORTS_DIR: /data/reports
      FIXTURES_DIR: /app/apps/cli/fixtures
      MANIFEST_PATH: /app/apps/cli/fixtures/manifest.json
      RPC_REQUEST_TIMEOUT_MS: 30000
    volumes:
      - ./docker-data:/data
    restart: "no"

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    depends_on:
      cli:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: /data/flovia.db
      PORT: 3001
    volumes:
      - ./docker-data:/data
    ports:
      - "3001:3001"
    restart: unless-stopped
